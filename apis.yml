aid: national-institute-of-corrections
name: National Institute of Corrections
description: >-
  The National Institute of Corrections (NIC) is an agency within the U.S.
  Department of Justice that provides training, technical assistance, and
  information to federal, state, and local corrections agencies. NIC publishes
  guidance, library resources, and corrections-related data through its
  website but does not currently expose a public web API.
